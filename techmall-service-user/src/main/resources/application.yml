server:
  port: 8081

spring:
  config:
    import: optional:nacos:${spring.application.name}.yml
  application:
    name: techmall-user-service
  datasource:
    url: jdbc:mysql://localhost:3306/techmall_user?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  cloud:
    nacos:
      server-addr: localhost:8848
      discovery:
        server-addr: localhost:8848
      config:
        server-addr: localhost:8848
        file-extension: yaml

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.techmall.user.entity
  configuration:
    map-underscore-to-camel-case: true

logging:
  level:
    com.techmall.user.mapper: debug
