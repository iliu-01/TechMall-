# ============================================================
# Nacos 配置 — techmall-order-service
# Data ID: techmall-order-service.yml
# Group:   DEFAULT_GROUP
# 格式:    YAML
# ============================================================
spring:
  datasource:
    url: jdbc:mysql://localhost:3306/techmall_order?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver

mybatis:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true

logging:
  level:
    com.techmall.order.mapper: debug
