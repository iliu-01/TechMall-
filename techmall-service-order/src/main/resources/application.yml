server:
  port: 8083

spring:
  application:
    name: techmall-order-service
  datasource:
    url: jdbc:mysql://localhost:3306/techmall_order?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848
      config:
        server-addr: localhost:8848
        file-extension: yaml
    openfeign:
      client:
        config:
          default:
            connect-timeout: 5000
            read-timeout: 5000
    sentinel:
      transport:
        dashboard: localhost:8858

mybatis:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true

logging:
  level:
    com.techmall.order.mapper: debug
